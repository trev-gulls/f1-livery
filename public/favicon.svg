<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <clipPath id="flag">
      <path d="M4 4h24c0 0 2 3 2 6s-2 6-2 6H4V4z"/>
    </clipPath>
  </defs>
  <!-- Pole -->
  <rect x="3" y="3" width="2" height="26" rx="1" fill="#08060d"/>
  <!-- Flag background -->
  <g clip-path="url(#flag)">
    <rect x="4" y="4" width="24" height="12" fill="#fff"/>
    <!-- Row 1 -->
    <rect x="4" y="4" width="4" height="4" fill="#08060d"/>
    <rect x="12" y="4" width="4" height="4" fill="#08060d"/>
    <rect x="20" y="4" width="4" height="4" fill="#08060d"/>
    <!-- Row 2 -->
    <rect x="8" y="8" width="4" height="4" fill="#08060d"/>
    <rect x="16" y="8" width="4" height="4" fill="#08060d"/>
    <rect x="24" y="8" width="4" height="4" fill="#08060d"/>
    <!-- Row 3 -->
    <rect x="4" y="12" width="4" height="4" fill="#08060d"/>
    <rect x="12" y="12" width="4" height="4" fill="#08060d"/>
    <rect x="20" y="12" width="4" height="4" fill="#08060d"/>
  </g>
  <!-- Flag border -->
  <path d="M4 4h24c0 0 2 3 2 6s-2 6-2 6H4V4z" fill="none" stroke="#08060d" stroke-width="0.75"/>
  <!-- Pole knob -->
  <circle cx="4" cy="3" r="1.5" fill="#08060d"/>
</svg>
